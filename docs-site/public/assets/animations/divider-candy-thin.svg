<svg width="1200" height="3" viewBox="0 0 1200 3" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .stripe { animation: march 2s linear infinite; }
    @keyframes march {
      0% { transform: translateX(0); }
      100% { transform: translateX(-16px); }
    }
  </style>
  <defs>
    <linearGradient id="ctb" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#083268" stop-opacity="0"/>
      <stop offset="20%" stop-color="#083268"/>
      <stop offset="50%" stop-color="#0186DB"/>
      <stop offset="80%" stop-color="#083268"/>
      <stop offset="100%" stop-color="#083268" stop-opacity="0"/>
    </linearGradient>
    <pattern id="cts" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M-2,2 l4,-4 M0,16 l16,-16 M14,18 l4,-4" stroke="white" stroke-opacity="0.12" stroke-width="5"/>
    </pattern>
  </defs>
  <rect width="1200" height="3" fill="url(#ctb)"/>
  <g class="stripe">
    <rect width="2400" height="3" fill="url(#cts)"/>
  </g>
</svg>
