name: Question or setup help
description: Ask for help with installation, editor setup, MCP setup, or expected behavior.
title: "[Question]: "
labels:
  - question
  - support
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Install
        - VS Code setup
        - Other editor setup
        - Claude Code or Codex MCP setup
        - CLI usage
        - MeTTa docs generation
        - Expected language behavior
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Include the command, setting, or file you are working with.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      value: |
        - OS:
        - VS Code or editor:
        - Node:
        - Install method:
    validations:
      required: false
