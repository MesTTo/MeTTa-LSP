name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-emacs
      - name: Typecheck and build
        run: npm run compile
      - name: Biome (format check + lint)
        run: npx biome ci .
      - name: ESLint (type-aware + architecture)
        run: npm run lint
      - name: Quality-guard forbidden patterns
        run: npm run quality-guard
      - name: knip (unused files, deps, exports)
        run: npm run knip
      - name: jscpd (copy-paste duplication)
        run: npm run jscpd
      - name: Tests
        run: npm test
      - name: Test Emacs mode
        run: npm run test:emacs
      - name: Smoke
        run: npm run smoke:all

  alloy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache the Alloy analyzer jar
        uses: actions/cache@v4
        with:
          path: .alloy/org.alloytools.alloy.dist.jar
          key: alloy-6.2.0
      - name: Alloy (engine invariants check clean)
        run: node scripts/check-alloy.mjs

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
